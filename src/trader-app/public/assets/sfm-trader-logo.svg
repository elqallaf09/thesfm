<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title>the-sfm trader premium mark</title>
  <defs>
    <linearGradient id="badgeFill" x1="9" y1="7" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#122333"/>
      <stop offset=".48" stop-color="#071119"/>
      <stop offset="1" stop-color="#02070c"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="8" y1="6" x2="58" y2="57" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff0b8"/>
      <stop offset=".34" stop-color="#d8ac50"/>
      <stop offset=".68" stop-color="#b9842d"/>
      <stop offset="1" stop-color="#ffe59d"/>
