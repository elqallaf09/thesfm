    <linearGradient id="signalLine" x1="13" y1="48" x2="53" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#178dff"/>
      <stop offset=".52" stop-color="#24d2b4"/>
      <stop offset="1" stop-color="#ffd56f"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="35%" cy="28%" r="72%">
