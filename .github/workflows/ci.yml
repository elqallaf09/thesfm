name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: CI/TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit --pretty false
        name: tsc --noEmit

  lint:
    name: CI/ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  i18n:
    name: CI/i18n check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:i18n

  launch-guards:
    name: CI/Production launch guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:prod-endpoints
      - run: pnpm check:public-env

  test:
    name: CI/Unit & Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:run
        name: vitest
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: CI/Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.the-sfm.com
      - run: pnpm check:performance-budget
        name: Enforce production performance budgets

  smoke:
    name: CI/Playwright smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # The Playwright config runs chromium-desktop, mobile-chrome, AND
      # mobile-webkit projects — webkit must be installed too, or a third of
      # the suite fails with a missing-executable error before any page loads.
      - run: pnpm exec playwright install --with-deps chromium webkit
      - name: Validate smoke environment
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPER_ADMIN_EMAILS: ${{ secrets.SUPER_ADMIN_EMAILS }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        shell: bash
        run: |
          trim_whitespace() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          missing=()
          for name in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            SUPER_ADMIN_EMAILS \
            E2E_USER_EMAIL \
            E2E_USER_PASSWORD \
            E2E_ADMIN_EMAIL \
            E2E_ADMIN_PASSWORD
          do
            if [[ -z "$(trim_whitespace "${!name:-}")" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required smoke environment variable: %s\n' "${missing[@]}" >&2
            exit 1
          fi

          anon_key="$(trim_whitespace "$NEXT_PUBLIC_SUPABASE_ANON_KEY")"
          service_role_key="$(trim_whitespace "$SUPABASE_SERVICE_ROLE_KEY")"
          if [[ "$anon_key" == "$service_role_key" ]]; then
            echo 'NEXT_PUBLIC_SUPABASE_ANON_KEY must never contain the service-role key.' >&2
            exit 1
          fi
      - name: Generate ephemeral Playwright TLS certificate
        shell: bash
        run: |
          install -d -m 700 "$RUNNER_TEMP/playwright-tls"
          openssl req -x509 -newkey rsa:2048 -sha256 -days 1 -nodes \
            -keyout "$RUNNER_TEMP/playwright-tls/key.pem" \
            -out "$RUNNER_TEMP/playwright-tls/cert.pem" \
            -subj '/CN=127.0.0.1' \
            -addext 'subjectAltName=IP:127.0.0.1'
          chmod 600 "$RUNNER_TEMP/playwright-tls/key.pem" "$RUNNER_TEMP/playwright-tls/cert.pem"
      - name: Verify WebKit Secure-cookie transport
        env:
          PLAYWRIGHT_TLS_CERT_PATH: ${{ runner.temp }}/playwright-tls/cert.pem
          PLAYWRIGHT_TLS_KEY_PATH: ${{ runner.temp }}/playwright-tls/key.pem
        run: node scripts/verify-playwright-https-cookie.mjs
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.the-sfm.com
      - run: pnpm test:smoke
        env:
          # Prevent Playwright's generated AI error context from copying a DOM
          # snapshot containing filled auth fields into CI diagnostics.
          PLAYWRIGHT_NO_COPY_PROMPT: '1'
          PLAYWRIGHT_HTTPS_LOOPBACK: '1'
          PLAYWRIGHT_WEB_SERVER_COMMAND: node scripts/playwright-https-proxy.mjs
          # Allows the synthetic Dashboard source fixture through local
          # middleware only. The bypass is disabled automatically on Vercel.
          SFM_LOCAL_DASHBOARD_QA: '1'
          PLAYWRIGHT_TLS_CERT_PATH: ${{ runner.temp }}/playwright-tls/cert.pem
          PLAYWRIGHT_TLS_KEY_PATH: ${{ runner.temp }}/playwright-tls/key.pem
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.the-sfm.com
          # Server-only secrets: consumed by the app server the smoke run
          # boots, enabling investor/admin flows. Never echoed by tests.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPER_ADMIN_EMAILS: ${{ secrets.SUPER_ADMIN_EMAILS }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      - run: pnpm test:performance
        name: Playwright platform performance regression suite
      - name: Remove Playwright DOM error contexts
        if: ${{ !cancelled() }}
        shell: bash
        run: find test-results -type f -name 'error-context.md' -delete 2>/dev/null || true
      - name: Upload Playwright diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 7

  lighthouse:
    name: CI/Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.the-sfm.com
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  authenticated-preview:
    name: CI/Authenticated Preview smoke
    if: github.event_name == 'pull_request'
    needs: [typecheck, lint, i18n, launch-guards, test, build, smoke, lighthouse]
    runs-on: ubuntu-latest
    environment: Preview
    permissions:
      contents: read
      deployments: read
      checks: read
    env:
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      SUPABASE_PRODUCTION_REF: ${{ vars.SUPABASE_PRODUCTION_REF }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_PREVIEW_SERVICE_ROLE_KEY }}
      SUPER_ADMIN_EMAILS: ${{ secrets.SUPER_ADMIN_EMAILS }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_EXPECTED_DEPLOYMENT_SHA: ${{ github.event.pull_request.head.sha }}
      PLAYWRIGHT_NO_COPY_PROMPT: '1'
    steps:
      - name: Validate authenticated Preview environment
        shell: bash
        run: |
          missing=()
          for name in \
            VERCEL_AUTOMATION_BYPASS_SECRET \
            SUPABASE_PRODUCTION_REF \
            SUPABASE_SERVICE_ROLE_KEY \
            SUPER_ADMIN_EMAILS \
            E2E_USER_EMAIL \
            E2E_USER_PASSWORD \
            E2E_ADMIN_EMAIL \
            E2E_ADMIN_PASSWORD \
            E2E_EXPECTED_DEPLOYMENT_SHA
          do
            value="${!name:-}"
            if [[ -z "${value//[[:space:]]/}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required authenticated Preview environment variable: %s\n' "${missing[@]}" >&2
            exit 1
          fi
          if [[ ! "$E2E_EXPECTED_DEPLOYMENT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'E2E_EXPECTED_DEPLOYMENT_SHA must be the exact committed SHA.' >&2
            exit 1
          fi
          if [[ ! "$SUPABASE_PRODUCTION_REF" =~ ^[a-z0-9]{20}$ ]]; then
            echo 'SUPABASE_PRODUCTION_REF must be an explicit Supabase project ref.' >&2
            exit 1
          fi

      - name: Resolve active isolated Supabase Preview ref for exact SHA
        id: supabase-preview
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const productionRef = process.env.SUPABASE_PRODUCTION_REF?.trim();
            if (!/^[a-z0-9]{20}$/.test(productionRef ?? '')) {
              core.setFailed('SUPABASE_PRODUCTION_REF must be an explicit Supabase project ref.');
              return;
            }

            const deadline = Date.now() + 10 * 60 * 1000;
            while (Date.now() < deadline) {
              const { data } = await github.rest.checks.listForRef({
                ...context.repo,
                ref: sha,
                per_page: 100,
              });
              const previews = data.check_runs.filter(check =>
                check.name === 'Supabase Preview' && check.app?.slug === 'supabase',
              );
              const terminalFailure = previews.find(check =>
                check.status === 'completed' && check.conclusion !== 'success',
              );
              if (terminalFailure) {
                core.setFailed(`Exact-SHA Supabase Preview check entered ${terminalFailure.conclusion ?? 'an unknown terminal state'}.`);
                return;
              }

              const successful = previews.filter(check =>
                check.status === 'completed' && check.conclusion === 'success',
              );
              if (successful.length > 0) {
                const resolvedRefs = new Set();
                for (const check of successful) {
                  let details;
                  try {
                    details = new URL(check.details_url ?? '');
                  } catch {
                    core.setFailed('Successful Supabase Preview check did not provide a valid dashboard URL.');
                    return;
                  }
                  const match = details.protocol === 'https:'
                    && details.hostname === 'supabase.com'
                    && !details.port
                    && !details.username
                    && !details.password
                    && !details.search
                    && !details.hash
                    && details.pathname.match(/^\/dashboard\/project\/([a-z0-9]{20})\/?$/);
                  if (!match) {
                    core.setFailed('Successful Supabase Preview check did not provide an exact Supabase dashboard project URL.');
                    return;
                  }
                  resolvedRefs.add(match[1]);
                }
                if (resolvedRefs.size !== 1) {
                  core.setFailed('Exact-SHA Supabase Preview checks resolved to ambiguous project refs.');
                  return;
                }

                const [previewRef] = resolvedRefs;
                if (previewRef === productionRef) {
                  core.setFailed('Resolved Supabase Preview ref matched the Production ref.');
                  return;
                }
                const previewUrl = `https://${previewRef}.supabase.co`;
                core.setOutput('ref', previewRef);
                core.setOutput('url', previewUrl);
                core.exportVariable('SUPABASE_PREVIEW_REF', previewRef);
                core.exportVariable('SUPABASE_PREVIEW_URL', previewUrl);
                core.info(`Resolved isolated Supabase Preview ref ${previewRef} for exact SHA ${sha}.`);
                return;
              }

              await new Promise(resolve => setTimeout(resolve, 15000));
            }
            core.setFailed('No READY isolated Supabase Preview check appeared for the exact committed SHA.');

      - name: Validate resolved isolated Supabase Preview target
        shell: bash
        run: |
          if [[ ! "$SUPABASE_PREVIEW_REF" =~ ^[a-z0-9]{20}$ ]]; then
            echo 'Resolved Supabase Preview ref was invalid.' >&2
            exit 1
          fi
          if [[ "$SUPABASE_PREVIEW_REF" == "$SUPABASE_PRODUCTION_REF" ]]; then
            echo 'Resolved Supabase Preview ref must never equal the Production ref.' >&2
            exit 1
          fi
          expected_url="https://${SUPABASE_PREVIEW_REF}.supabase.co"
          if [[ "$SUPABASE_PREVIEW_URL" != "$expected_url" ]]; then
            echo 'Resolved Supabase Preview URL did not match its verified ref.' >&2
            exit 1
          fi

      - name: Resolve READY Vercel Preview for exact SHA
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const deadline = Date.now() + 10 * 60 * 1000;
            while (Date.now() < deadline) {
              const deployments = await github.paginate(github.rest.repos.listDeployments, {
                ...context.repo,
                sha,
                environment: 'Preview',
                per_page: 100,
              });
              const exact = deployments
                .filter(deployment => deployment.sha === sha && deployment.ref === sha && deployment.environment === 'Preview')
                .sort((left, right) => Date.parse(right.created_at) - Date.parse(left.created_at));
              for (const deployment of exact) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  ...context.repo,
                  deployment_id: deployment.id,
                  per_page: 100,
                });
                const latest = statuses[0];
                if (!latest) continue;
                if (['failure', 'error', 'inactive'].includes(latest.state)) {
                  core.setFailed(`Exact-SHA Preview deployment entered ${latest.state}.`);
                  return;
                }
                if (latest.state !== 'success') continue;
                const candidate = latest.environment_url || latest.target_url;
                let target;
                try {
                  target = new URL(candidate);
                } catch {
                  core.setFailed('Successful Preview deployment did not provide a valid URL.');
                  return;
                }
                if (target.protocol !== 'https:' || !target.hostname.endsWith('.vercel.app')) {
                  core.setFailed('Resolved deployment URL was not an HTTPS Vercel Preview URL.');
                  return;
                }
                core.setOutput('url', target.origin);
                return;
              }
              await new Promise(resolve => setTimeout(resolve, 15000));
            }
            core.setFailed('No READY Vercel Preview deployment appeared for the exact committed SHA.');

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium webkit

      - name: Provision isolated Preview auth fixtures
        run: node tests/smoke/preview-auth-fixtures.mjs provision

      - name: Validate authenticated request-to-row observability and isolation
        env:
          E2E_BASE_URL: ${{ steps.preview.outputs.url }}
          SFM_PREVIEW_OBSERVABILITY_QA: '1'
        run: >-
          pnpm exec playwright test
          --config=playwright.preview.config.ts
          --project=chromium-desktop
          tests/smoke/observability-preview.spec.ts

      - name: Run complete authenticated remote smoke suite
        env:
          E2E_BASE_URL: ${{ steps.preview.outputs.url }}
        run: pnpm exec playwright test --config=playwright.preview.config.ts

      - name: Cleanup isolated Preview auth fixtures
        if: always()
        run: node tests/smoke/preview-auth-fixtures.mjs cleanup
